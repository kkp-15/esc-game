<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>へや3：リビング</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .snack-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }
    .snack-card {
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 20px;
      padding: 20px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
    }
    .snack-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .snack-card.selected-good {
      border-color: var(--accent3);
      background: rgba(85,230,165,0.1);
      cursor: default;
    }
    .snack-card.selected-bad {
      border-color: var(--accent2);
      background: rgba(255,121,121,0.08);
      cursor: default;
    }
    .snack-emoji { font-size: 3rem; display: block; margin-bottom: 8px; }
    .snack-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .snack-price { font-size: 1.2rem; color: var(--accent); font-family: 'Kaisei Decol', serif; }
    .snack-amount { font-size: 0.95rem; color: var(--text-sub); margin-top: 4px; }
    .snack-per { font-size: 0.9rem; color: var(--accent3); margin-top: 6px; font-weight: 700; }

  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2LM85GJN0L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2LM85GJN0L');
  </script>
</head>
<body>
  <div class="container">

    <div class="room-header">
      <div class="room-title">🛋️ へや3：リビング</div>
      <div class="room-subtitle">チョコはどこだ！？ でも…なんか　かくしてある？</div>
    </div>

    <div style="text-align:center;font-size:0.9rem;color:var(--accent);margin-bottom:6px;font-weight:700;">ステージ1</div>
    <div class="progress-bar">
      <div class="progress-dot done"></div>
      <div class="progress-dot done"></div>
      <div class="progress-dot current"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>

    <div class="room-visual">
      <div class="room-emoji-scene">
        📺 🛋️ 🪴<br>
        🍫🔒 📦 🎄
      </div>
      <div class="room-description">
        リビングについた！でもチョコのはこに　かぎがかかってる。<br>
        テーブルのうえに　おかしの　チラシが　おいてある🗒️
      </div>
    </div>

    <div class="coin-hint">
      <span class="coin-avatar">🐱</span>
      <div class="coin-text">
        <strong>コイン より</strong>
        チラシに　おなじねだんのチョコが　2しゅるいのってるにゃ。
        「どっちがおとく？」をかんがえると
        はこが　あくみたいにゃ🛒
      </div>
    </div>

    <!-- インベントリ -->
    <div class="inventory">
      <div class="inventory-title">🎒 もちもの</div>
      <div class="inventory-items" id="inventory"></div>
    </div>

    <!-- ステップ1：おやつ比較 -->
    <div id="step1">
      <div class="puzzle-box">
        <div class="puzzle-title">🗒️ チラシをよんでみよう！どっちがおとく？</div>
        <div style="font-size:1rem;color:var(--text-sub);margin-bottom:14px;">
          おなじねだん！どっちが　たくさんはいってる？
        </div>
        <div class="snack-compare">
          <div class="snack-card" id="snack-a" onclick="selectSnack('a')">
            <span class="snack-emoji">🍫</span>
            <div class="snack-name">チョコA</div>
            <div class="snack-price">100えん</div>
            <div class="snack-amount">2こいり</div>
            <div class="snack-per" id="per-a">1こ = ?えん</div>
          </div>
          <div class="snack-card" id="snack-b" onclick="selectSnack('b')">
            <span class="snack-emoji">🍫</span>
            <div class="snack-name">チョコB</div>
            <div class="snack-price">100えん</div>
            <div class="snack-amount">5こいり</div>
            <div class="snack-per" id="per-b">1こ = ?えん</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:4px;">
          <button class="btn btn-secondary" onclick="showHint()" style="font-size:1rem;padding:10px 20px;">
            💡 ヒントをみる
          </button>
        </div>
        <div class="feedback" id="feedback1"></div>
      </div>
    </div>

    <!-- ステップ2：クリア -->
    <div id="step2" style="display:none;">
      <button class="btn btn-success" onclick="goNext()">
        🍫 チョコをもって　キッチンへ →
      </button>
    </div>

  </div>

  <script src="game.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Game.isRoomClear(2)) {
        window.location.href = 'index.html';
        return;
      }
      document.getElementById('per-a').textContent = '1\u3053 = 50\u3048\u3093';
      document.getElementById('per-b').textContent = '1\u3053 = 20\u3048\u3093';
      renderInventory('inventory', ['flashlight', 'piggybank_note', 'coin_card']);
    });

    function selectSnack(choice) {
      if (choice === 'b') {
        document.getElementById('snack-a').classList.add('selected-bad');
        document.getElementById('snack-b').classList.add('selected-good');
        Game.addItem('snack_coupon');
        Game.setRoomClear(3);
        renderInventory('inventory', ['flashlight', 'piggybank_note', 'coin_card', 'snack_coupon']);
        showModal(
          '\ud83c\udf6b',
          '\u305b\u3044\u304b\u3044\uff01\u30c1\u30e7\u30b3B\u304c\u304a\u3068\u304f\uff01',
          '\u30c1\u30e7\u30b3A\uff1a100\u3048\u3093 \u00f7 2\u3053 = <strong>1\u305350\u3048\u3093</strong><br>\u30c1\u30e7\u30b3B\uff1a100\u3048\u3093 \u00f7 5\u3053 = <strong>1\u305320\u3048\u3093</strong><br><br>\u304a\u306a\u3058\u306d\u3060\u3093\u3067\u3082\u3000B\u306e\u307b\u3046\u304c\u305f\u304f\u3055\u3093\u306f\u3044\u3063\u3066\u308b\u304b\u3089\u304a\u3068\u304f\uff01',
          '\u306d\u3060\u3093\u3060\u3051\u3058\u3083\u306a\u304f\u300c\u306a\u3093\u3053\u306f\u3044\u3063\u3066\u308b\uff1f\u300d\u3067\u304f\u3089\u3079\u308b\u3068\u3000\u307b\u3093\u3068\u3046\u306b\u304a\u3068\u304f\u306a\u3082\u306e\u304c\u308f\u304b\u308b\u3002\u3053\u308c\u304c\u300c\u30b3\u30b9\u30d1\u300d\u306e\u304b\u3093\u304c\u3048\u304b\u305f\uff01',
          '\ud83c\udf6b \u30c1\u30e7\u30b3\u3092\u30b2\u30c3\u30c8\uff01',
          () => {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
          }
        );
      } else {
        document.getElementById('snack-a').classList.add('selected-bad');
        wrongAnswer('feedback1', '❌ チョコAは2こしかはいってないよ…Bもみてみよう！');
      }
    }

    function showHint() {
      showModal(
        '\ud83d\udca1',
        '\u30b3\u30b9\u30d1\u306e\u30d2\u30f3\u30c8\uff01',
        '\u304a\u306a\u3058\u306d\u3060\u3093\u306e\u3068\u304d\u3001\u305f\u304f\u3055\u3093\u306f\u3044\u3063\u3066\u308b\u307b\u3046\u304c\u304a\u3068\u304f\uff01<br><br>\u30c1\u30e7\u30b3A\uff1a100\u3048\u3093\u3067 2\u3053<br>\u30c1\u30e7\u30b3B\uff1a100\u3048\u3093\u3067 5\u3053<br><br>\u3069\u3063\u3061\u304c\u305f\u304f\u3055\u3093\u305f\u3079\u3089\u308c\u308b\u304b\u306a\uff1f',
        null,
        '\u308f\u304b\u3063\u305f\uff01',
        null
      );
    }

    function goNext() {
      window.location.href = 'room4.html';
    }
  </script>
</body>
</html>
