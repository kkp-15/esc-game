<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲームオーバー</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2LM85GJN0L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2LM85GJN0L');
  </script>
</head>
<body>
  <div class="container">
    <div class="gameover-screen">
      <div id="go-emoji" style="font-size:4rem;margin-bottom:16px;animation:shake 0.6s ease-in-out;">😱</div>
      <div class="gameover-title" id="go-title">みつかった〜！！</div>
      <div id="go-desc" style="font-size:0.9rem;color:var(--text-sub);margin:12px 0 24px;line-height:1.8;">
        パパが　おきてしまった…💦<br>
        「けんた！はやくねなさい！！」
      </div>

      <div class="coin-hint">
        <span class="coin-avatar">🐱</span>
        <div class="coin-text">
          <strong>コイン より</strong>
          だいじょうぶにゃ！　もう一かいちょうせんしてにゃ。
          しっぱいは　せいちょうのもとにゃよ💪
        </div>
      </div>

      <div style="margin-top:24px;display:flex;flex-direction:column;gap:12px;">
        <button class="btn btn-success" onclick="retry()">
          🔄 もう一かい　ちょうせん！
        </button>
        <button class="btn btn-secondary" onclick="goTop()">
          🏠 タイトルにもどる
        </button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    // ステージ判定
    document.addEventListener('DOMContentLoaded', function() {
      if (Game.isRoomClear(8)) {
        // ステージ3のゲームオーバー
        document.getElementById('go-emoji').textContent = '😭';
        document.getElementById('go-title').textContent = 'かせぎ しっぱい…！';
        document.getElementById('go-desc').innerHTML =
          'ちょっと まちがえすぎちゃった…💦<br>' +
          'もういちど けいかくして やってみよう！';
      } else if (Game.isRoomClear(4)) {
        // ステージ2のゲームオーバー
        document.getElementById('go-emoji').textContent = '😵';
        document.getElementById('go-title').textContent = 'おかいもの しっぱい…！';
        document.getElementById('go-desc').innerHTML =
          'まちがえすぎて おかねを むだづかい しちゃった…💸<br>' +
          'もういちど かんがえて やってみよう！';
      }
      // ライフを回復
      Game.setLives(Game.MAX_LIVES);
    });

    function retry() {
      if (Game.isRoomClear(11)) { window.location.href = 'room12.html'; return; }
      if (Game.isRoomClear(10)) { window.location.href = 'room11.html'; return; }
      if (Game.isRoomClear(9)) { window.location.href = 'room10.html'; return; }
      if (Game.isRoomClear(8)) { window.location.href = 'room9.html'; return; }
      if (Game.isRoomClear(7)) { window.location.href = 'room8.html'; return; }
      if (Game.isRoomClear(6)) { window.location.href = 'room7.html'; return; }
      if (Game.isRoomClear(5)) { window.location.href = 'room6.html'; return; }
      if (Game.isRoomClear(4)) { window.location.href = 'room5.html'; return; }
      if (Game.isRoomClear(3)) { window.location.href = 'room4.html'; return; }
      if (Game.isRoomClear(2)) { window.location.href = 'room3.html'; return; }
      if (Game.isRoomClear(1)) { window.location.href = 'room2.html'; return; }
      window.location.href = 'room1.html';
    }
    function goTop() {
      Game.reset();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
